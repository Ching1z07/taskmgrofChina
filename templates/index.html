<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Task Manager</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #08080e;
    --surface: #0f0f1a;
    --surface2: #141422;
    --border: #1a1a2e;
    --border2: #252538;
    --accent: #7c6aff;
    --accent-glow: rgba(124,106,255,0.2);
    --accent2: #ff6a9e;
    --text: #edeaf5;
    --muted: #8888aa;
    --pending: #f5a623;
    --progress: #7c6aff;
    --done: #4cdf8a;
    --high: #ff4e6a;
    --medium: #f5a623;
    --low: #4cdf8a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--muted); }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(26,26,46,0.6) 1px, transparent 1px),
      linear-gradient(90deg, rgba(26,26,46,0.6) 1px, transparent 1px);
    background-size: 44px 44px;
    pointer-events: none;
    z-index: 0;
  }

  body::after {
    content: '';
    position: fixed;
    top: -300px;
    left: -300px;
    width: 700px;
    height: 700px;
    background: radial-gradient(circle, rgba(124,106,255,0.07) 0%, transparent 65%);
    pointer-events: none;
    z-index: 0;
  }

  .app { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; padding: 40px 24px; }

  /* ── Header ── */
  header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    margin-bottom: 44px;
    padding-bottom: 22px;
    border-bottom: 1px solid var(--border);
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 2rem;
    letter-spacing: -0.04em;
    background: linear-gradient(135deg, var(--text) 0%, rgba(232,232,240,0.6) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .logo span {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .header-sub { font-size: 0.65rem; color: var(--muted); margin-top: 5px; letter-spacing: 0.04em; }
  .header-meta { font-size: 0.7rem; color: var(--muted); text-align: right; line-height: 1.9; }

  .admin-badge {
    font-size: 0.6rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--accent2);
    border: 1px solid rgba(255,106,158,0.3);
    background: rgba(255,106,158,0.08);
    padding: 3px 9px;
    border-radius: 20px;
    margin-right: 10px;
  }

  .owner-badge {
    font-size: 0.6rem;
    color: var(--muted);
    border: 1px solid var(--border);
    padding: 2px 7px;
    border-radius: 20px;
    letter-spacing: 0.03em;
  }

  /* ── Chat button ── */
  .btn-chat {
    position: relative;
    background: none; border: 1px solid var(--border);
    border-radius: 20px; color: var(--muted);
    padding: 7px 10px; margin-left: 10px;
    transition: all 0.2s; display: flex; align-items: center;
    text-decoration: none;
  }
  .btn-chat:hover { border-color: var(--accent); color: var(--accent); box-shadow: 0 0 14px rgba(124,106,255,0.12); }
  .btn-chat svg { width: 13px; height: 13px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .chat-unread-dot {
    position: absolute; top: 5px; right: 5px;
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--accent2); border: 2px solid var(--bg);
  }

  /* ── Settings button + dropdown ── */
  .settings-wrap { position: relative; margin-left: 10px; }

  .btn-settings {
    background: none; border: 1px solid var(--border);
    border-radius: 20px; color: var(--muted);
    cursor: pointer; padding: 7px 10px;
    transition: all 0.2s; display: flex; align-items: center;
  }
  .btn-settings:hover { border-color: var(--border2); color: var(--text); }
  .btn-settings.open { border-color: var(--accent); color: var(--accent); }
  .btn-settings svg { width: 13px; height: 13px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }

  .settings-dropdown {
    display: none;
    position: absolute; top: calc(100% + 8px); right: 0;
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 10px;
    min-width: 180px;
    box-shadow: 0 16px 40px rgba(0,0,0,0.45);
    overflow: hidden;
    animation: popIn 0.15s ease;
    z-index: 50;
  }
  .settings-dropdown.open { display: block; }

  .settings-user {
    padding: 12px 14px 10px;
    border-bottom: 1px solid var(--border);
    font-size: 0.68rem; color: var(--muted);
    display: flex; align-items: center; gap: 8px;
  }
  .settings-user strong { color: var(--text); font-size: 0.78rem; }

  .settings-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 14px; font-size: 0.75rem; color: var(--text);
    text-decoration: none; cursor: pointer;
    background: none; border: none; width: 100%;
    text-align: left; font-family: 'DM Mono', monospace;
    transition: background 0.15s;
  }
  .settings-item:hover { background: var(--surface2); }
  .settings-item svg { width: 13px; height: 13px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; }
  .settings-item.danger { color: var(--high); }
  .settings-item.danger:hover { background: rgba(255,78,106,0.07); }
  .settings-sep { height: 1px; background: var(--border); margin: 4px 0; }

  /* ── Delete account modal ── */
  .del-modal {
    background: var(--surface);
    border: 1px solid rgba(255,78,106,0.25);
    border-radius: 16px;
    padding: 28px;
    width: 400px;
    max-width: 90vw;
    animation: popIn 0.2s ease;
    box-shadow: 0 32px 80px rgba(0,0,0,0.55), 0 0 0 1px rgba(255,78,106,0.06);
  }
  .del-modal-icon {
    width: 44px; height: 44px;
    border-radius: 50%;
    background: rgba(255,78,106,0.1);
    border: 1px solid rgba(255,78,106,0.2);
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 16px;
    color: var(--high);
  }
  .del-modal-icon svg {
    width: 20px; height: 20px;
    stroke: currentColor; fill: none;
    stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round;
  }
  .del-modal-title {
    font-family: 'Syne', sans-serif;
    font-size: 1rem; font-weight: 700;
    margin-bottom: 8px;
  }
  .del-modal-desc {
    font-size: 0.73rem; color: var(--muted);
    line-height: 1.65; margin-bottom: 20px;
  }
  .del-modal-desc strong { color: var(--text); }
  .del-confirm-row { display: flex; gap: 8px; }
  .del-confirm-row .btn { flex: 1; }
  .btn-danger {
    background: linear-gradient(135deg, #ff4e6a, #d93652);
    box-shadow: none;
  }
  .btn-danger:hover { box-shadow: 0 4px 20px rgba(255,78,106,0.4); }

  /* ── Stats ── */
  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 26px; }

  .stat {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px 16px;
    position: relative;
    overflow: hidden;
    transition: border-color 0.25s, transform 0.2s;
    cursor: default;
  }

  .stat::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent 0%, var(--accent) 50%, transparent 100%);
    opacity: 0;
    transition: opacity 0.25s;
  }

  .stat:hover { border-color: var(--border2); transform: translateY(-2px); }
  .stat:hover::after { opacity: 0.6; }

  .stat-num {
    font-family: 'Syne', sans-serif;
    font-size: 1.9rem;
    font-weight: 800;
    letter-spacing: -0.03em;
    line-height: 1;
  }

  .stat-label {
    font-size: 0.62rem;
    color: var(--muted);
    margin-top: 7px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
  }

  /* ── Layout ── */
  .main { display: grid; grid-template-columns: 280px 1fr; gap: 20px; }
  .sidebar { display: flex; flex-direction: column; gap: 14px; }

  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }

  .panel-head {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    font-size: 0.62rem;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--muted);
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: linear-gradient(90deg, rgba(124,106,255,0.05), transparent 60%);
  }

  .form-body { padding: 14px; display: flex; flex-direction: column; gap: 8px; }

  /* ── Inputs ── */
  input:not([type=color]):not([type=file]),
  textarea,
  select {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 7px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.77rem;
    padding: 9px 11px;
    width: 100%;
    transition: border-color 0.2s, box-shadow 0.2s;
    outline: none;
  }

  input:not([type=color]):not([type=file]):focus,
  textarea:focus,
  select:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow);
  }

  textarea { resize: vertical; min-height: 68px; }
  select { cursor: pointer; }
  select option { background: var(--surface2); }

  .color-row { display: grid; grid-template-columns: 1fr 36px; gap: 8px; align-items: center; }

  .color-swatch {
    width: 36px;
    height: 36px;
    border-radius: 7px;
    border: 1px solid var(--border);
    padding: 3px;
    cursor: pointer;
    background: var(--bg);
    transition: border-color 0.2s, box-shadow 0.2s;
    outline: none;
  }
  .color-swatch:hover { border-color: var(--accent); }
  .color-swatch:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }

  /* ── Buttons ── */
  .btn {
    background: linear-gradient(135deg, #7c6aff 0%, #9b5de5 100%);
    border: none;
    border-radius: 7px;
    color: #fff;
    cursor: pointer;
    font-family: 'Syne', sans-serif;
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 0.07em;
    padding: 10px 16px;
    transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
    width: 100%;
    text-transform: uppercase;
  }

  .btn:hover {
    opacity: 0.88;
    box-shadow: 0 4px 20px rgba(124,106,255,0.4);
    transform: translateY(-1px);
  }

  .btn:active { transform: scale(0.97) translateY(0); box-shadow: none; }

  .btn-ghost {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    box-shadow: none;
  }
  .btn-ghost:hover {
    border-color: var(--accent2);
    color: var(--accent2);
    opacity: 1;
    box-shadow: 0 0 14px rgba(255,106,158,0.1);
    transform: translateY(-1px);
  }

  /* ── Category list ── */
  .cat-list { padding: 6px; display: flex; flex-direction: column; gap: 2px; }

  .cat-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 10px;
    border-radius: 7px;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
    font-size: 0.77rem;
    border: 1px solid transparent;
  }

  .cat-item:hover { background: var(--surface2); border-color: var(--border); }
  .cat-item.active { background: rgba(124,106,255,0.1); border-color: rgba(124,106,255,0.22); }

  .cat-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .cat-name { flex: 1; }
  .cat-count {
    font-size: 0.62rem;
    color: var(--muted);
    background: var(--bg);
    padding: 2px 7px;
    border-radius: 10px;
    border: 1px solid var(--border);
  }

  .cat-del {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 0.78rem;
    padding: 0 2px;
    opacity: 0;
    transition: opacity 0.15s, color 0.15s;
    line-height: 1;
  }
  .cat-item:hover .cat-del { opacity: 1; }
  .cat-del:hover { color: var(--high); }

  /* ── Task area ── */
  .task-area { display: flex; flex-direction: column; gap: 10px; }

  .filters {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px;
  }

  .filter-btn {
    background: transparent;
    border: 1px solid transparent;
    border-radius: 20px;
    color: var(--muted);
    cursor: pointer;
    font-family: 'DM Mono', monospace;
    font-size: 0.67rem;
    padding: 5px 14px;
    transition: all 0.15s;
    letter-spacing: 0.04em;
  }

  .filter-btn:hover { border-color: var(--border); color: var(--text); background: var(--surface2); }
  .filter-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(124,106,255,0.1); }

  .tasks { display: flex; flex-direction: column; gap: 6px; }

  /* ── Task card ── */
  .task-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 10px;
    transition: border-color 0.2s, transform 0.15s, box-shadow 0.2s;
    animation: slideIn 0.25s ease;
    position: relative;
    overflow: hidden;
  }

  .task-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    border-radius: 0 2px 2px 0;
  }

  .task-card[data-status="pending"]::before { background: var(--pending); }
  .task-card[data-status="in_progress"]::before { background: var(--progress); }
  .task-card[data-status="done"]::before { background: var(--done); opacity: 0.5; }
  .task-card[data-status="done"] { opacity: 0.65; }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .task-card:hover { border-color: var(--border2); transform: translateX(2px); }
  .task-card[data-status="pending"]:hover { box-shadow: -3px 0 16px rgba(245,166,35,0.12); }
  .task-card[data-status="in_progress"]:hover { box-shadow: -3px 0 16px rgba(124,106,255,0.12); }
  .task-card[data-status="done"]:hover { box-shadow: -3px 0 16px rgba(76,223,138,0.08); }

  .task-name {
    font-family: 'Syne', sans-serif;
    font-size: 0.9rem;
    font-weight: 600;
    margin-bottom: 6px;
    letter-spacing: -0.01em;
  }

  .task-desc { font-size: 0.71rem; color: var(--muted); margin-bottom: 8px; line-height: 1.65; }
  .task-meta { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; margin-top: 8px; }

  /* ── Badges ── */
  .badge {
    font-size: 0.6rem;
    padding: 2px 8px;
    border-radius: 20px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    border: 1px solid;
  }

  .badge-pending  { background: rgba(245,166,35,0.08);  color: var(--pending);  border-color: rgba(245,166,35,0.2);  }
  .badge-progress { background: rgba(124,106,255,0.08); color: var(--progress); border-color: rgba(124,106,255,0.2); }
  .badge-done     { background: rgba(76,223,138,0.08);  color: var(--done);     border-color: rgba(76,223,138,0.2);  }
  .badge-high     { background: rgba(255,78,106,0.08);  color: var(--high);     border-color: rgba(255,78,106,0.2);  }
  .badge-medium   { background: rgba(245,166,35,0.08);  color: var(--medium);   border-color: rgba(245,166,35,0.2);  }
  .badge-low      { background: rgba(76,223,138,0.08);  color: var(--low);      border-color: rgba(76,223,138,0.2);  }
  .cat-badge { font-size: 0.6rem; padding: 2px 8px; border-radius: 20px; font-weight: 500; border: 1px solid; }

  .task-actions { display: flex; gap: 5px; align-items: flex-start; }

  .icon-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--muted);
    cursor: pointer;
    font-size: 0.7rem;
    padding: 5px 8px;
    transition: all 0.15s;
    line-height: 1;
  }
  .icon-btn:hover { border-color: var(--accent2); color: var(--accent2); background: rgba(255,106,158,0.05); }
  .icon-btn.del:hover { border-color: var(--high); color: var(--high); background: rgba(255,78,106,0.05); }

  .task-img {
    width: 100%;
    border-radius: 7px;
    margin-bottom: 6px;
    border: 1px solid var(--border);
    max-height: 160px;
    object-fit: cover;
    cursor: zoom-in;
    transition: opacity 0.2s, transform 0.2s;
  }
  .task-img:hover { opacity: 0.88; transform: scale(1.01); }

  /* ── Empty ── */
  .empty {
    text-align: center;
    padding: 64px 20px;
    color: var(--muted);
    font-size: 0.77rem;
    background: var(--surface);
    border: 1px dashed var(--border);
    border-radius: 12px;
    line-height: 1;
  }
  .empty-icon { font-size: 2rem; margin-bottom: 14px; display: block; opacity: 0.4; }

  /* ── Lightbox ── */
  .lightbox {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.94);
    backdrop-filter: blur(14px);
    z-index: 300;
    display: flex; align-items: center; justify-content: center;
    animation: fadeIn 0.2s;
    cursor: zoom-out;
  }
  .lightbox img {
    max-width: 90vw; max-height: 90vh;
    border-radius: 12px;
    box-shadow: 0 0 100px rgba(0,0,0,0.8);
    animation: popIn 0.22s ease;
    cursor: default;
  }
  .lightbox-close {
    position: fixed; top: 20px; right: 24px;
    color: rgba(255,255,255,0.6); font-size: 1.1rem; cursor: pointer;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    width: 34px; height: 34px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .lightbox-close:hover { background: rgba(255,255,255,0.14); color: #fff; }

  /* ── Modal ── */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.75);
    backdrop-filter: blur(8px);
    z-index: 100;
    display: flex; align-items: center; justify-content: center;
    animation: fadeIn 0.15s;
  }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 16px;
    padding: 28px;
    width: 420px;
    max-width: 90vw;
    animation: popIn 0.2s ease;
    box-shadow: 0 32px 80px rgba(0,0,0,0.55), 0 0 0 1px rgba(124,106,255,0.06);
  }

  @keyframes popIn {
    from { transform: scale(0.95) translateY(10px); opacity: 0; }
    to { transform: scale(1) translateY(0); opacity: 1; }
  }

  .modal-title {
    font-family: 'Syne', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    margin-bottom: 18px;
    letter-spacing: -0.01em;
  }

  .modal-form { display: flex; flex-direction: column; gap: 8px; }
  .modal-actions { display: flex; gap: 8px; margin-top: 12px; }
  .modal-actions .btn { flex: 1; }

  /* ── Toast ── */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 10px;
    padding: 10px 16px;
    font-size: 0.73rem;
    z-index: 200;
    animation: toastIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    max-width: 260px;
    box-shadow: 0 8px 28px rgba(0,0,0,0.45);
  }

  @keyframes toastIn {
    from { transform: translateY(18px) scale(0.93); opacity: 0; }
    to { transform: translateY(0) scale(1); opacity: 1; }
  }

  .loading { color: var(--muted); font-size: 0.73rem; padding: 20px; text-align: center; }

  /* ── File upload ── */
  .file-upload-zone {
    border: 1px dashed var(--border);
    border-radius: 7px;
    padding: 16px 12px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
  }
  .file-upload-zone:hover { border-color: var(--accent); background: rgba(124,106,255,0.04); }
  .file-upload-zone.has-file { border-color: var(--done); border-style: solid; background: rgba(76,223,138,0.03); }
  .file-upload-icon { font-size: 1rem; color: var(--muted); }
  .file-upload-text { font-size: 0.67rem; color: var(--muted); }
  .file-upload-name { font-size: 0.67rem; color: var(--done); word-break: break-all; }
  #tImage { display: none; }

  /* ── Responsive ── */
  @media (max-width: 900px) {
    .main { grid-template-columns: 240px 1fr; }
  }

  @media (max-width: 768px) {
    .app { padding: 24px 16px; }

    header { flex-wrap: wrap; gap: 10px; margin-bottom: 24px; padding-bottom: 16px; }
    .logo { font-size: 1.5rem; }
    .header-sub { font-size: 0.58rem; }
    .header-meta { display: none; }

    .stats { grid-template-columns: repeat(2, 1fr); gap: 8px; margin-bottom: 18px; }

    .main { display: flex; flex-direction: column; gap: 16px; }
    .task-area { order: 1; }
    .sidebar { order: 2; }

    .modal { padding: 20px 18px; }
    .del-modal { padding: 20px 18px; }

    .toast { bottom: 14px; right: 14px; left: 14px; max-width: none; text-align: center; }
  }

  @media (max-width: 480px) {
    .app { padding: 14px 12px; }

    header { gap: 8px; margin-bottom: 18px; }
    header > div:last-child { gap: 6px !important; }
    .logo { font-size: 1.3rem; }
    .admin-badge { font-size: 0.55rem; padding: 2px 7px; }

    .stats { gap: 6px; }
    .stat { padding: 12px 10px; }
    .stat-num { font-size: 1.55rem; }
    .stat-label { font-size: 0.57rem; }

    .filters { padding: 8px; gap: 4px; }
    .filter-btn { font-size: 0.62rem; padding: 4px 9px; }

    .task-card { padding: 11px 13px; }
    .task-name { font-size: 0.84rem; }

    .del-confirm-row { flex-direction: column; }
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <div>
      <div class="logo">task<span>mgr</span></div>
      <div class="header-sub">127.0.0.1:5500</div>
    </div>
    <div style="display:flex;align-items:center;gap:0">
      <div class="header-meta" id="headerMeta">yüklənir...</div>
      <span class="admin-badge" id="adminBadge" style="display:none">admin</span>
      <a href="/chat" class="btn-chat" id="chatBtn" title="Chat">
        <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        <span class="chat-unread-dot" id="chatDot" style="display:none"></span>
      </a>
      <div class="settings-wrap">
        <button class="btn-settings" id="settingsBtn" onclick="toggleSettings()" title="Parametrlər">
          <svg viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
        </button>
        <div class="settings-dropdown" id="settingsDropdown">
          <div class="settings-user">
            <svg viewBox="0 0 24 24" style="width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <strong id="settingsUsername">—</strong>
          </div>
          <form method="POST" action="/logout" style="margin:0">
            <button type="submit" class="settings-item">
              <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
              Çıxış
            </button>
          </form>
          <div class="settings-sep"></div>
          <button class="settings-item danger" onclick="closeSettings(); openDelModal()">
            <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
            Hesabı sil
          </button>
        </div>
      </div>
    </div>
  </header>

  <div class="stats">
    <div class="stat">
      <div class="stat-num" id="statTotal">—</div>
      <div class="stat-label">Ümumi</div>
    </div>
    <div class="stat">
      <div class="stat-num" style="color:var(--pending)" id="statPending">—</div>
      <div class="stat-label">Gözləyir</div>
    </div>
    <div class="stat">
      <div class="stat-num" style="color:var(--progress)" id="statProgress">—</div>
      <div class="stat-label">Davam edir</div>
    </div>
    <div class="stat">
      <div class="stat-num" style="color:var(--done)" id="statDone">—</div>
      <div class="stat-label">Tamamlandı</div>
    </div>
  </div>

  <div class="main">
    <div class="sidebar">
      <div class="panel">
        <div class="panel-head">+ Yeni Task</div>
        <div class="form-body">
          <input id="tName" placeholder="Task adı *" />
          <textarea id="tDesc" placeholder="Açıqlama"></textarea>
          <div>
            <input type="file" id="tImage" accept="image/png,image/jpeg" />
            <div class="file-upload-zone" id="tImageZone" onclick="document.getElementById('tImage').click()">
              <div class="file-upload-icon">↑</div>
              <div class="file-upload-text">PNG / JPG şəkil seç</div>
              <div class="file-upload-name" id="tImageName" style="display:none;"></div>
            </div>
            <div id="tPreview" style="display:none;margin-top:8px;">
              <img id="tPreviewImg" style="width:100%;border-radius:7px;border:1px solid var(--border);" />
            </div>
          </div>
          <select id="tStatus">
            <option value="pending">⏳ Gözləyir</option>
            <option value="in_progress">🔄 Davam edir</option>
            <option value="done">✅ Tamamlandı</option>
          </select>
          <select id="tPriority">
            <option value="medium">🟡 Orta prioritet</option>
            <option value="high">🔴 Yüksək prioritet</option>
            <option value="low">🟢 Aşağı prioritet</option>
          </select>
          <select id="tCategory">
            <option value="">Kateqoriyasız</option>
          </select>
          <button class="btn" onclick="createTask()">Əlavə et</button>
        </div>
      </div>

      <div class="panel">
        <div class="panel-head"><span>Kateqoriyalar</span></div>
        <div class="form-body" style="padding-bottom:8px">
          <div class="color-row">
            <input id="catName" placeholder="Kateqoriya adı" />
            <input id="catColor" type="color" value="#7c6aff" class="color-swatch" />
          </div>
          <button class="btn btn-ghost" onclick="createCategory()">+ Əlavə et</button>
        </div>
        <div class="cat-list" id="catList">
          <div class="loading">yüklənir...</div>
        </div>
      </div>
    </div>

    <div class="task-area">
      <div class="filters">
        <button class="filter-btn active" onclick="setFilter('all', this)">Hamısı</button>
        <button class="filter-btn" onclick="setFilter('pending', this)">⏳ Gözləyir</button>
        <button class="filter-btn" onclick="setFilter('in_progress', this)">🔄 Davam edir</button>
        <button class="filter-btn" onclick="setFilter('done', this)">✅ Tamamlandı</button>
      </div>
      <div class="tasks" id="taskList">
        <div class="loading">yüklənir...</div>
      </div>
    </div>
  </div>
</div>

<!-- Delete Account Modal -->
<div class="modal-overlay" id="delAccountModal" style="display:none" onclick="closeDelModal(event)">
  <div class="del-modal">
    <div class="del-modal-icon">
      <svg viewBox="0 0 24 24">
        <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
        <path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/>
      </svg>
    </div>
    <div class="del-modal-title">Hesabı sil</div>
    <div class="del-modal-desc">
      Bu əməliyyat geri alına <strong>bilməz</strong>. Hesabınız və bütün tasklarınız həmişəlik silinəcək.
    </div>
    <div class="del-confirm-row">
      <button class="btn btn-ghost" onclick="document.getElementById('delAccountModal').style.display='none'">Ləğv et</button>
      <button class="btn btn-danger" onclick="confirmDeleteAccount()">Hesabı sil</button>
    </div>
  </div>
</div>

<!-- Edit Modal -->
<div class="modal-overlay" id="editModal" style="display:none" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-title">Taskı Yenilə</div>
    <div class="modal-form">
      <input id="eName" placeholder="Task adı *" />
      <select id="eStatus">
        <option value="pending">⏳ Gözləyir</option>
        <option value="in_progress">🔄 Davam edir</option>
        <option value="done">✅ Tamamlandı</option>
      </select>
      <select id="ePriority">
        <option value="medium">🟡 Orta prioritet</option>
        <option value="high">🔴 Yüksək prioritet</option>
        <option value="low">🟢 Aşağı prioritet</option>
      </select>
      <select id="eCategory">
        <option value="">Kateqoriyasız</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="document.getElementById('editModal').style.display='none'">Ləğv et</button>
      <button class="btn" onclick="saveEdit()">Yadda saxla</button>
    </div>
  </div>
</div>

<script>
function escHtml(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

const API = '';
let allTasks = [];
let allCats = [];
let currentFilter = 'all';
let currentCatFilter = null;
let editingId = null;
let currentUser = null;

async function api(path, method='GET', body=null) {
  const opts = { method, headers: {'Content-Type':'application/json'} };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(API + path, opts);
  return res.json();
}

function toast(msg) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2500);
}

function openLightbox(src) {
  const lb = document.createElement('div');
  lb.className = 'lightbox';
  lb.innerHTML = `<button class="lightbox-close" onclick="this.parentElement.remove()">✕</button><img src="${src}" onclick="event.stopPropagation()" />`;
  lb.addEventListener('click', () => lb.remove());
  document.addEventListener('keydown', function esc(e) {
    if (e.key === 'Escape') { lb.remove(); document.removeEventListener('keydown', esc); }
  });
  document.body.appendChild(lb);
}

async function load() {
  currentUser = await api('/me');
  document.getElementById('settingsUsername').textContent = currentUser.username;
  if (currentUser.is_admin) {
    document.getElementById('adminBadge').style.display = 'inline-block';
  }
  await Promise.all([loadCats(), loadTasks()]);
}

async function loadTasks() {
  let path = '/tasks';
  const params = [];
  if (currentFilter !== 'all') params.push(`status=${currentFilter}`);
  if (currentCatFilter) params.push(`category_id=${currentCatFilter}`);
  if (params.length) path += '?' + params.join('&');
  const data = await api(path);
  allTasks = Array.isArray(data) ? data : [];
  renderTasks();
  updateStats();
}

async function loadCats() {
  const data = await api('/categories');
  allCats = Array.isArray(data) ? data : [];
  renderCats();
  populateCatSelects();
  updateStats();
}

function updateStats() {
  const all = allTasks.length;
  const pending = allTasks.filter(t=>t.status==='pending').length;
  const progress = allTasks.filter(t=>t.status==='in_progress').length;
  const done = allTasks.filter(t=>t.status==='done').length;
  document.getElementById('statTotal').textContent = all;
  document.getElementById('statPending').textContent = pending;
  document.getElementById('statProgress').textContent = progress;
  document.getElementById('statDone').textContent = done;
  document.getElementById('headerMeta').textContent = `${all} task · ${allCats.length} kateqoriya`;
}

function renderTasks() {
  const el = document.getElementById('taskList');
  if (!allTasks.length) {
    el.innerHTML = `<div class="empty"><span class="empty-icon">📋</span>Task yoxdur</div>`;
    return;
  }
  const statusBadge = { pending: 'badge-pending', in_progress: 'badge-progress', done: 'badge-done' };
  const statusLabel = { pending: 'Gözləyir', in_progress: 'Davam edir', done: 'Tamamlandı' };
  const priBadge = { high: 'badge-high', medium: 'badge-medium', low: 'badge-low' };
  const priLabel = { high: '↑ Yüksək', medium: '→ Orta', low: '↓ Aşağı' };

  el.innerHTML = allTasks.map(t => `
    <div class="task-card" data-status="${t.status}">
      <div>
        <div class="task-name">${escHtml(t.name)}</div>
        ${t.image_url ? `<img class="task-img" src="${escHtml(t.image_url)}" onclick="openLightbox('${escHtml(t.image_url)}')" />` : ''}
        ${t.description ? `<div class="task-desc">${escHtml(t.description)}</div>` : ''}
        <div class="task-meta">
          <span class="badge ${statusBadge[t.status]}">${statusLabel[t.status]}</span>
          <span class="badge ${priBadge[t.priority]}">${priLabel[t.priority]}</span>
          ${t.category ? `<span class="cat-badge" style="background:${escHtml(t.category.color)}18;color:${escHtml(t.category.color)};border-color:${escHtml(t.category.color)}33">${escHtml(t.category.name)}</span>` : ''}
          ${currentUser && currentUser.is_admin && t.owner ? `<span class="owner-badge">@${escHtml(t.owner)}</span>` : ''}
        </div>
      </div>
      <div class="task-actions">
        <button class="icon-btn" onclick="openEdit(${t.id})">✏️</button>
        <button class="icon-btn del" onclick="deleteTask(${t.id})">🗑</button>
      </div>
    </div>
  `).join('');
}

function renderCats() {
  const el = document.getElementById('catList');
  if (!allCats.length) {
    el.innerHTML = `<div style="padding:12px 10px;font-size:0.72rem;color:var(--muted)">Hələ kateqoriya yoxdur</div>`;
    return;
  }
  el.innerHTML = allCats.map(c => `
    <div class="cat-item ${currentCatFilter == c.id ? 'active' : ''}" onclick="filterByCat(${c.id})">
      <span class="cat-dot" style="background:${escHtml(c.color)}"></span>
      <span class="cat-name">${escHtml(c.name)}</span>
      <span class="cat-count">${c.task_count}</span>
      <button class="cat-del" onclick="event.stopPropagation();deleteCat(${c.id})">✕</button>
    </div>
  `).join('');
}

function populateCatSelects() {
  const opts = `<option value="">Kateqoriyasız</option>` + allCats.map(c =>
    `<option value="${c.id}">${escHtml(c.name)}</option>`).join('');
  document.getElementById('tCategory').innerHTML = opts;
  document.getElementById('eCategory').innerHTML = opts;
}

function setFilter(val, btn) {
  currentFilter = val;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  loadTasks();
}

function filterByCat(id) {
  currentCatFilter = currentCatFilter == id ? null : id;
  renderCats();
  loadTasks();
}

async function createTask() {
  const name = document.getElementById('tName').value.trim();
  if (!name) { toast('❗ Task adı yazın'); return; }

  const formData = new FormData();
  formData.append('name', name);
  formData.append('description', document.getElementById('tDesc').value);
  formData.append('status', document.getElementById('tStatus').value);
  formData.append('priority', document.getElementById('tPriority').value);
  formData.append('category_id', document.getElementById('tCategory').value || '');

  const imageFile = document.getElementById('tImage').files[0];
  if (imageFile) formData.append('image', imageFile);

  await fetch('/tasks', { method: 'POST', body: formData });

  currentFilter = 'all';
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('.filter-btn').classList.add('active');

  document.getElementById('tName').value = '';
  document.getElementById('tDesc').value = '';
  document.getElementById('tImage').value = '';
  document.getElementById('tPreview').style.display = 'none';
  const zone = document.getElementById('tImageZone');
  zone.classList.remove('has-file');
  zone.querySelector('.file-upload-text').textContent = 'PNG / JPG şəkil seç';
  document.getElementById('tImageName').style.display = 'none';

  toast('✅ Task əlavə edildi');
  await loadTasks();
  await loadCats();
}

async function deleteTask(id) {
  if (!confirm('Bu taskı silmək istəyirsiniz?')) return;
  await api(`/tasks/${id}`, 'DELETE');
  toast('🗑 Task silindi');
  await loadTasks();
  await loadCats();
}

function openEdit(id) {
  const t = allTasks.find(x => x.id === id);
  if (!t) return;
  editingId = id;
  document.getElementById('eName').value = t.name;
  document.getElementById('eStatus').value = t.status;
  document.getElementById('ePriority').value = t.priority;
  document.getElementById('eCategory').value = t.category ? t.category.id : '';
  document.getElementById('editModal').style.display = 'flex';
}

async function saveEdit() {
  const name = document.getElementById('eName').value.trim();
  if (!name) { toast('❗ Task adı yazın'); return; }
  await api(`/tasks/${editingId}`, 'PUT', {
    name,
    status: document.getElementById('eStatus').value,
    priority: document.getElementById('ePriority').value,
    category_id: document.getElementById('eCategory').value || null,
  });
  document.getElementById('editModal').style.display = 'none';
  toast('✏️ Task yeniləndi');
  await loadTasks();
}

function closeModal(e) {
  if (e.target.classList.contains('modal-overlay'))
    document.getElementById('editModal').style.display = 'none';
}

function toggleSettings() {
  const btn = document.getElementById('settingsBtn');
  const dd  = document.getElementById('settingsDropdown');
  const open = dd.classList.toggle('open');
  btn.classList.toggle('open', open);
}

function closeSettings() {
  document.getElementById('settingsDropdown').classList.remove('open');
  document.getElementById('settingsBtn').classList.remove('open');
}

document.addEventListener('click', e => {
  if (!e.target.closest('.settings-wrap')) closeSettings();
});

function openDelModal() {
  document.getElementById('delAccountModal').style.display = 'flex';
}

function closeDelModal(e) {
  if (e.target.classList.contains('modal-overlay'))
    document.getElementById('delAccountModal').style.display = 'none';
}

async function confirmDeleteAccount() {
  await api('/delete-account', 'DELETE');
  window.location.href = '/login';
}

async function createCategory() {
  const name = document.getElementById('catName').value.trim();
  if (!name) { toast('❗ Kateqoriya adı yazın'); return; }
  const color = document.getElementById('catColor').value;
  await api('/categories', 'POST', { name, color });
  document.getElementById('catName').value = '';
  toast('🏷 Kateqoriya əlavə edildi');
  await loadCats();
}

async function deleteCat(id) {
  if (!confirm('Bu kateqoriyanı silmək istəyirsiniz?')) return;
  await api(`/categories/${id}`, 'DELETE');
  if (currentCatFilter == id) currentCatFilter = null;
  toast('🗑 Kateqoriya silindi');
  await load();
}

document.getElementById('tImage').addEventListener('change', function() {
  const file = this.files[0];
  const zone = document.getElementById('tImageZone');
  const nameEl = document.getElementById('tImageName');
  if (file) {
    zone.classList.add('has-file');
    nameEl.textContent = file.name;
    nameEl.style.display = 'block';
    zone.querySelector('.file-upload-text').textContent = 'Dəyişdirmək üçün klik et';
    const reader = new FileReader();
    reader.onload = e => {
      document.getElementById('tPreviewImg').src = e.target.result;
      document.getElementById('tPreview').style.display = 'block';
    };
    reader.readAsDataURL(file);
  }
});

load();

fetch('/chat/unread').then(r => r.json()).then(data => {
  const total = Object.values(data).reduce((s, v) => s + v, 0);
  if (total > 0) document.getElementById('chatDot').style.display = 'block';
});
</script>

<!-- ── Global incoming-call overlay ───────────────────────── -->
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<style>
.gcall-overlay{display:none;position:fixed;inset:0;background:rgba(8,8,14,.92);z-index:9999;flex-direction:column;align-items:center;justify-content:center;gap:20px}
.gcall-avatar{width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,#7c6aff,#ff6a9e);display:flex;align-items:center;justify-content:center;font-size:2rem;font-weight:700;color:#fff;font-family:'Syne',sans-serif;animation:gcallPulse 2s ease-in-out infinite}
@keyframes gcallPulse{0%,100%{box-shadow:0 0 0 0 rgba(124,106,255,.5)}70%{box-shadow:0 0 0 20px rgba(124,106,255,0)}}
.gcall-name{font-family:'Syne',sans-serif;font-size:1.4rem;font-weight:700;color:#e8e8f0}
.gcall-sub{font-size:.7rem;color:#6060a0;text-transform:uppercase;letter-spacing:.14em}
.gcall-actions{display:flex;gap:28px;margin-top:8px}
.gcall-active-bar{display:none;position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#0f0f1a;border:1px solid #1a1a2e;border-radius:40px;padding:10px 20px;z-index:9999;align-items:center;gap:14px;font-family:'DM Mono',monospace;font-size:.75rem;color:#e8e8f0}
.gcall-live-dot{width:8px;height:8px;border-radius:50%;background:#4cdf8a;animation:gcallBlink 1.4s ease-in-out infinite}
@keyframes gcallBlink{0%,100%{opacity:1}50%{opacity:.2}}
.gcall-bar-btn{background:none;border:1px solid rgba(255,255,255,.15);border-radius:20px;padding:6px 14px;color:#e8e8f0;cursor:pointer;font-size:.7rem;transition:.15s}
.gcall-bar-btn:hover{background:rgba(124,106,255,.2)}
.gcall-bar-btn.end{background:rgba(255,78,106,.15);border-color:rgba(255,78,106,.4);color:#ff4e6a}
.gcall-btn{width:64px;height:64px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .15s}
.gcall-btn:hover{transform:scale(1.08)}
.gcall-btn.accept{background:#4cdf8a;box-shadow:0 4px 20px rgba(76,223,138,.5)}
.gcall-btn.reject{background:#ff4e6a;box-shadow:0 4px 20px rgba(255,78,106,.4)}
.gcall-btn svg{width:26px;height:26px;stroke:#fff;fill:none;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}
</style>

<div class="gcall-overlay" id="gCallOverlay">
  <div class="gcall-avatar" id="gCallAvatar"></div>
  <div class="gcall-name" id="gCallName"></div>
  <div class="gcall-sub">zəng edir...</div>
  <div class="gcall-actions">
    <button class="gcall-btn accept" onclick="gAcceptCall()" title="Qəbul et">
      <svg viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.41 2 2 0 0 1 3.6 1.24h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L7.91 8.84a16 16 0 0 0 6.29 6.29l.86-.86a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
    </button>
    <button class="gcall-btn reject" onclick="gRejectCall()" title="Rədd et">
      <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>
</div>

<div class="gcall-active-bar" id="gActiveBar">
  <div class="gcall-live-dot"></div>
  <span id="gBarName"></span>
  <span id="gBarDur">00:00</span>
  <button class="gcall-bar-btn" onclick="gToggleMute()" id="gMuteBtn">Kəs</button>
  <button class="gcall-bar-btn end" onclick="gEndCall()">Bitir</button>
</div>

<audio id="gRemoteAudio" autoplay playsinline></audio>

<script>
(function(){
  const ICE = { iceServers:[{urls:"stun:stun.l.google.com:19302"},{urls:"stun:stun1.l.google.com:19302"}] };
  const gsock = io();

  let gCallerId=null, gCallerName=null, gPc=null, gStream=null;
  let gMuted=false, gTimer=null, gSecs=0, gCallState=null;

  function gCreatePC(peerId){
    const c = new RTCPeerConnection(ICE);
    c.onicecandidate = e => { if(e.candidate) gsock.emit("ice_candidate",{peer_id:peerId,candidate:e.candidate}); };
    c.ontrack = e => { const a=document.getElementById("gRemoteAudio"); if(a) a.srcObject=e.streams[0]; };
    c.onconnectionstatechange = () => { if(c.connectionState==="disconnected"||c.connectionState==="failed") gReset(); };
    return c;
  }

  function gStartTimer(name){
    gSecs=0;
    document.getElementById("gBarName").textContent=name;
    document.getElementById("gBarDur").textContent="00:00";
    document.getElementById("gActiveBar").style.display="flex";
    gTimer=setInterval(()=>{
      gSecs++;
      const m=String(Math.floor(gSecs/60)).padStart(2,"0");
      const s=String(gSecs%60).padStart(2,"0");
      document.getElementById("gBarDur").textContent=m+":"+s;
    },1000);
  }

  function gReset(){
    clearInterval(gTimer); gTimer=null; gSecs=0;
    if(gStream){gStream.getTracks().forEach(t=>t.stop());gStream=null;}
    if(gPc){gPc.close();gPc=null;}
    gMuted=false; gCallState=null; gCallerId=null; gCallerName=null;
    document.getElementById("gCallOverlay").style.display="none";
    document.getElementById("gActiveBar").style.display="none";
    document.getElementById("gMuteBtn").textContent="Kəs";
  }

  // Ring tone using Web Audio API
  let gRingCtx=null, gRingNodes=[];
  function gStartRing(){
    try{
      gRingCtx = new (window.AudioContext||window.webkitAudioContext)();
      function beep(){
        const o=gRingCtx.createOscillator(), g=gRingCtx.createGain();
        o.connect(g); g.connect(gRingCtx.destination);
        o.frequency.value=880; g.gain.value=0.3;
        o.start(); o.stop(gRingCtx.currentTime+0.3);
        gRingNodes.push(o);
      }
      beep();
      gRingNodes._iv = setInterval(beep, 1200);
    }catch{}
  }
  function gStopRing(){
    if(gRingNodes._iv) clearInterval(gRingNodes._iv);
    gRingNodes=[]; if(gRingCtx){gRingCtx.close(); gRingCtx=null;}
  }

  // Browser notification
  function gNotify(name){
    if(!("Notification" in window)) return;
    const show=()=>{ try{ new Notification("📞 Gələn zəng", {body: name+" zəng edir...", icon:"/static/icon.png"}); }catch{} };
    if(Notification.permission==="granted") show();
    else if(Notification.permission!=="denied") Notification.requestPermission().then(p=>{ if(p==="granted") show(); });
  }

  // Incoming call
  gsock.on("call_invite", data => {
    if(gCallState){ gsock.emit("call_reject",{caller_id:data.from_id}); return; }
    gCallerId=data.from_id; gCallerName=data.from_name; gCallState="incoming";
    document.getElementById("gCallAvatar").textContent=gCallerName[0].toUpperCase();
    document.getElementById("gCallName").textContent=gCallerName;
    document.getElementById("gCallOverlay").style.display="flex";
    gStartRing();
    gNotify(gCallerName);
  });

  window.gAcceptCall = async function(){
    gStopRing();
    document.getElementById("gCallOverlay").style.display="none";
    try{ gStream=await navigator.mediaDevices.getUserMedia({audio:true,video:false}); }
    catch{ alert("Mikrofona icazə verilmədi."); gsock.emit("call_reject",{caller_id:gCallerId}); gReset(); return; }
    gPc=gCreatePC(gCallerId);
    gStream.getTracks().forEach(t=>gPc.addTrack(t,gStream));
    gsock.emit("call_accept",{caller_id:gCallerId});
    gCallState="active";
    gStartTimer(gCallerName);
  };

  window.gRejectCall = function(){
    gStopRing();
    gsock.emit("call_reject",{caller_id:gCallerId});
    gReset();
  };

  window.gEndCall = function(){
    gsock.emit("call_end",{peer_id:gCallerId});
    gReset();
  };

  window.gToggleMute = function(){
    if(!gStream) return;
    gMuted=!gMuted;
    gStream.getAudioTracks().forEach(t=>t.enabled=!gMuted);
    document.getElementById("gMuteBtn").textContent=gMuted?"Aç":"Kəs";
  };

  // WebRTC signaling (callee side)
  gsock.on("webrtc_offer", async data => {
    if(!gPc) return;
    await gPc.setRemoteDescription(new RTCSessionDescription(data.sdp));
    const answer=await gPc.createAnswer();
    await gPc.setLocalDescription(answer);
    gsock.emit("webrtc_answer",{caller_id:gCallerId,sdp:gPc.localDescription});
  });

  gsock.on("ice_candidate", async data => {
    if(!gPc||!data.candidate) return;
    try{ await gPc.addIceCandidate(new RTCIceCandidate(data.candidate)); }catch{}
  });

  gsock.on("call_reject", ()=>gReset());
  gsock.on("call_end",    ()=>gReset());
})();
</script>
</body>
</html>
