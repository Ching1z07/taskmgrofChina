<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat — taskmgr</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<style>
  :root {
    --bg: #08080e;
    --surface: #0f0f1a;
    --surface2: #141422;
    --border: #1a1a2e;
    --border2: #252538;
    --accent: #7c6aff;
    --accent2: #ff6a9e;
    --accent-glow: rgba(124,106,255,0.2);
    --text: #edeaf5;
    --muted: #8888aa;
    --done: #4cdf8a;
    --high: #ff4e6a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--muted); }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(26,26,46,0.5) 1px, transparent 1px),
      linear-gradient(90deg, rgba(26,26,46,0.5) 1px, transparent 1px);
    background-size: 44px 44px;
    pointer-events: none; z-index: 0;
  }

  /* ── Top bar ── */
  .topbar {
    position: relative; z-index: 2;
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }

  .topbar-left { display: flex; align-items: center; gap: 16px; }

  .logo {
    font-family: 'Syne', sans-serif; font-weight: 800;
    font-size: 1.2rem; letter-spacing: -0.03em;
    background: linear-gradient(135deg, var(--text), rgba(232,232,240,0.6));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .logo span {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }

  .topbar-title {
    font-size: 0.65rem; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.14em;
    border-left: 1px solid var(--border); padding-left: 16px;
  }

  .topbar-links { display: flex; gap: 8px; align-items: center; }

  .nav-link {
    font-size: 0.68rem; color: var(--muted); text-decoration: none;
    border: 1px solid var(--border); padding: 6px 13px;
    border-radius: 20px; transition: all 0.2s; font-family: 'DM Mono', monospace;
  }
  .nav-link:hover { border-color: var(--accent); color: var(--accent); }

  /* ── Layout ── */
  .layout {
    position: relative; z-index: 1;
    display: grid; grid-template-columns: 260px 1fr;
    flex: 1; overflow: hidden;
  }

  /* ── Users sidebar ── */
  .users-panel {
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column; overflow: hidden;
    background: var(--surface);
  }

  .users-head {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    font-size: 0.62rem; text-transform: uppercase;
    letter-spacing: 0.14em; color: var(--muted);
    background: linear-gradient(90deg, rgba(124,106,255,0.05), transparent);
    flex-shrink: 0;
  }

  .users-list { flex: 1; overflow-y: auto; padding: 6px; }

  .user-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px; border-radius: 8px; cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
    border: 1px solid transparent; position: relative;
  }
  .user-item:hover { background: var(--surface2); border-color: var(--border); }
  .user-item.active { background: rgba(124,106,255,0.1); border-color: rgba(124,106,255,0.22); }

  .user-avatar {
    width: 34px; height: 34px; border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex; align-items: center; justify-content: center;
    font-family: 'Syne', sans-serif; font-weight: 700;
    font-size: 0.8rem; color: #fff; flex-shrink: 0;
    position: relative;
  }

  .online-dot {
    position: absolute; bottom: 1px; right: 1px;
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--muted); border: 2px solid var(--surface);
    transition: background 0.3s;
  }
  .online-dot.online { background: var(--done); }

  .user-info { flex: 1; min-width: 0; }
  .user-name { font-size: 0.8rem; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .user-status { font-size: 0.62rem; color: var(--muted); margin-top: 1px; }

  .unread-badge {
    background: var(--accent); color: #fff;
    font-size: 0.6rem; font-weight: 700;
    padding: 2px 6px; border-radius: 10px;
    display: none;
  }
  .unread-badge.visible { display: block; }

  /* ── Chat area ── */
  .chat-area {
    display: flex; flex-direction: column; overflow: hidden;
  }

  .chat-header {
    padding: 14px 20px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 12px;
    background: var(--surface); flex-shrink: 0;
  }

  .chat-peer-avatar {
    width: 32px; height: 32px; border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex; align-items: center; justify-content: center;
    font-family: 'Syne', sans-serif; font-weight: 700;
    font-size: 0.75rem; color: #fff;
  }

  .chat-peer-name { font-size: 0.85rem; font-weight: 600; font-family: 'Syne', sans-serif; }
  .chat-peer-sub { font-size: 0.62rem; color: var(--muted); margin-top: 1px; }

  .chat-empty {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    color: var(--muted); font-size: 0.78rem; gap: 12px;
    opacity: 0.6;
  }
  .chat-empty-icon { font-size: 2.5rem; opacity: 0.4; }

  /* ── Messages ── */
  .messages {
    flex: 1; overflow-y: auto;
    padding: 20px; display: flex; flex-direction: column; gap: 6px;
  }

  .msg-row {
    display: flex; align-items: flex-end; gap: 8px;
    animation: msgIn 0.2s ease;
  }
  .msg-row.mine { flex-direction: row-reverse; }

  @keyframes msgIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .msg-bubble {
    max-width: 68%; padding: 9px 13px;
    border-radius: 14px; font-size: 0.8rem; line-height: 1.55;
    word-break: break-word;
  }

  .msg-row:not(.mine) .msg-bubble {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
    color: var(--text);
  }

  .msg-row.mine .msg-bubble {
    background: linear-gradient(135deg, #7c6aff, #9b5de5);
    color: #fff;
    border-bottom-right-radius: 4px;
  }

  .msg-time {
    font-size: 0.58rem; color: var(--muted);
    flex-shrink: 0; margin-bottom: 2px;
  }

  .typing-indicator {
    display: none; align-items: center; gap: 8px;
    padding: 0 20px 12px; font-size: 0.68rem; color: var(--muted);
  }
  .typing-indicator.visible { display: flex; }
  .typing-dots { display: flex; gap: 3px; }
  .typing-dots span {
    width: 5px; height: 5px; border-radius: 50%;
    background: var(--muted); animation: dot 1.2s infinite;
  }
  .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes dot {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-4px); opacity: 1; }
  }

  /* ── Input bar ── */
  .input-bar {
    padding: 14px 20px; border-top: 1px solid var(--border);
    display: flex; gap: 10px; align-items: flex-end;
    background: var(--surface); flex-shrink: 0;
  }

  .msg-input {
    flex: 1; background: var(--bg);
    border: 1px solid var(--border); border-radius: 10px;
    color: var(--text); font-family: 'DM Mono', monospace;
    font-size: 0.8rem; padding: 10px 14px;
    outline: none; resize: none; max-height: 120px;
    transition: border-color 0.2s, box-shadow 0.2s;
    line-height: 1.5;
  }
  .msg-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
  .msg-input::placeholder { color: var(--muted); }

  .send-btn {
    width: 40px; height: 40px; border-radius: 10px;
    background: linear-gradient(135deg, var(--accent), #9b5de5);
    border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
  }
  .send-btn:hover { opacity: 0.88; transform: scale(1.05); box-shadow: 0 4px 16px rgba(124,106,255,0.4); }
  .send-btn:active { transform: scale(0.95); }
  .send-btn svg { width: 16px; height: 16px; stroke: #fff; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

  .input-bar.disabled .msg-input { opacity: 0.4; pointer-events: none; }
  .input-bar.disabled .send-btn { opacity: 0.3; pointer-events: none; }

  /* date separator */
  .date-sep {
    text-align: center; font-size: 0.62rem;
    color: var(--muted); margin: 8px 0;
    display: flex; align-items: center; gap: 10px;
  }
  .date-sep::before, .date-sep::after {
    content: ''; flex: 1; height: 1px; background: var(--border);
  }

  /* ── Back button (mobile only) ── */
  .back-btn {
    display: none;
    background: none; border: none; cursor: pointer;
    color: var(--muted); padding: 4px 6px 4px 0;
    align-items: center; justify-content: center;
    transition: color 0.15s; flex-shrink: 0;
  }
  .back-btn:hover { color: var(--text); }

  /* ── Responsive ── */
  @media (max-width: 700px) {
    .topbar { padding: 12px 16px; }
    .topbar-title { display: none; }
    .logo { font-size: 1rem; }
    .nav-link { font-size: 0.62rem; padding: 5px 10px; }

    .layout { display: block; height: 100%; position: relative; }

    .users-panel {
      position: absolute; inset: 0;
      z-index: 2; display: flex;
      transition: transform 0.28s ease;
    }

    .chat-area {
      position: absolute; inset: 0;
      z-index: 1; display: flex;
      transform: translateX(100%);
      transition: transform 0.28s ease;
    }

    .layout.chat-open .users-panel { transform: translateX(-100%); }
    .layout.chat-open .chat-area { transform: translateX(0); }

    .back-btn { display: flex; }

    .msg-bubble { max-width: 82%; }
    .messages { padding: 12px 14px; }
    .input-bar { padding: 10px 12px; }
    .users-list { padding: 4px; }
  }

  /* ── Find-user bar (non-admin) ── */
  .find-user-bar {
    padding: 10px 8px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .find-user-row { position: relative; }
  .find-user-bar input {
    width: 100%; background: var(--bg);
    border: 1px solid var(--border2); border-radius: 6px;
    color: var(--text); font-family: 'DM Mono', monospace;
    font-size: 0.78rem; padding: 7px 38px 7px 10px;
    outline: none; transition: border-color 0.2s;
  }
  .find-user-bar input:focus { border-color: var(--accent); }
  .find-user-btn {
    position: absolute; right: 2px; top: 2px; bottom: 2px;
    background: var(--accent); border: none; border-radius: 4px;
    color: #fff; cursor: pointer; padding: 0 9px;
    font-size: 0.8rem; transition: opacity 0.15s;
  }
  .find-user-btn:hover { opacity: 0.82; }
  .find-user-err {
    font-size: 0.65rem; color: #ff6b82;
    margin-top: 5px; padding: 0 2px; display: none;
  }

  @media (max-width: 400px) {
    .topbar-links .nav-link:first-child { display: none; }
    .user-name { font-size: 0.75rem; }
  }

  /* ── Call UI ─────────────────────────────────────────────── */
  .active-call-bar {
    position: relative; z-index: 2;
    background: rgba(76,223,138,0.06);
    border-bottom: 1px solid rgba(76,223,138,0.18);
    padding: 8px 20px;
    display: flex; align-items: center; gap: 10px;
    font-size: 0.72rem; color: var(--done); flex-shrink: 0;
  }
  .call-live-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--done); flex-shrink: 0;
    animation: callBlink 1.4s ease-in-out infinite;
  }
  @keyframes callBlink { 0%,100%{opacity:1;} 50%{opacity:0.2;} }
  .call-bar-name { color: var(--text); }
  .call-bar-dur { margin-left: auto; font-family:'DM Mono',monospace; color: var(--muted); }
  .call-bar-btn {
    width: 26px; height: 26px; border-radius: 50%;
    border: 1px solid rgba(124,106,255,0.3);
    background: rgba(124,106,255,0.08);
    cursor: pointer; display:flex; align-items:center; justify-content:center;
    color: var(--text); transition: all 0.15s;
  }
  .call-bar-btn:hover { background: rgba(124,106,255,0.2); }
  .call-bar-btn.muted-bar { background: rgba(255,78,106,0.15); border-color:rgba(255,78,106,0.3); color: var(--high); }
  .call-bar-btn.end-bar { background: rgba(255,78,106,0.1); border-color:rgba(255,78,106,0.3); color: var(--high); }
  .call-bar-btn.end-bar:hover { background: rgba(255,78,106,0.25); }
  .call-bar-btn svg { width:12px; height:12px; stroke:currentColor; fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }

  .call-header-btn {
    margin-left: auto;
    width: 30px; height: 30px; border-radius: 50%;
    background: none; border: 1px solid var(--border);
    cursor: pointer; color: var(--muted);
    display:flex; align-items:center; justify-content:center;
    transition: all 0.2s; flex-shrink: 0;
  }
  .call-header-btn:hover { color: var(--done); border-color: var(--done); background: rgba(76,223,138,0.08); }
  .call-header-btn svg { width:14px; height:14px; stroke:currentColor; fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }

  .call-overlay {
    position: fixed; inset: 0;
    background: rgba(8,8,14,0.94);
    backdrop-filter: blur(14px);
    z-index: 300;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 22px;
  }
  .call-ov-avatar {
    width: 88px; height: 88px; border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display:flex; align-items:center; justify-content:center;
    font-family:'Syne',sans-serif; font-weight:800;
    font-size:2.2rem; color:#fff;
    animation: callPulse 2s ease-in-out infinite;
  }
  @keyframes callPulse {
    0%,100% { box-shadow: 0 0 0 0 rgba(124,106,255,0.45), 0 0 0 0 rgba(124,106,255,0.2); }
    60%      { box-shadow: 0 0 0 18px rgba(124,106,255,0), 0 0 0 36px rgba(124,106,255,0); }
  }
  .call-ov-name { font-family:'Syne',sans-serif; font-size:1.5rem; font-weight:700; color:var(--text); }
  .call-ov-status { font-size:0.7rem; color:var(--muted); text-transform:uppercase; letter-spacing:0.14em; }
  .call-ov-actions { display:flex; gap:24px; margin-top:8px; }
  .call-ov-btn {
    width:60px; height:60px; border-radius:50%;
    border:none; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    transition: transform 0.15s, box-shadow 0.2s;
  }
  .call-ov-btn:hover { transform: scale(1.08); }
  .call-ov-btn:active { transform: scale(0.94); }
  .call-ov-btn.accept { background:#4cdf8a; box-shadow:0 4px 20px rgba(76,223,138,0.5); }
  .call-ov-btn.reject, .call-ov-btn.cancel { background:#ff4e6a; box-shadow:0 4px 20px rgba(255,78,106,0.4); }
  .call-ov-btn svg { width:26px; height:26px; stroke:#fff; fill:none; stroke-width:2.2; stroke-linecap:round; stroke-linejoin:round; }
</style>
</head>
<body>
<div class="topbar">
  <div class="topbar-left">
    <a href="/" style="text-decoration:none"><div class="logo">task<span>mgr</span></div></a>
    <div class="topbar-title">Chat</div>
  </div>
  <div class="topbar-links">
    <a href="/" class="nav-link">← Tasklar</a>
    <form method="POST" action="/logout" style="display:inline">
      <button type="submit" class="nav-link" style="background:none;cursor:pointer;font-family:inherit">Çıxış</button>
    </form>
  </div>
</div>

<div class="active-call-bar" id="activeCallBar" style="display:none">
  <div class="call-live-dot"></div>
  <span>Zəng:</span>
  <span class="call-bar-name" id="activeCallName"></span>
  <span class="call-bar-dur" id="callDuration">00:00</span>
  <button class="call-bar-btn" id="muteBtn" onclick="toggleMute()" title="Səsi kəs">
    <svg viewBox="0 0 24 24"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
  </button>
  <button class="call-bar-btn end-bar" onclick="endCall()" title="Zəngi bitir">
    <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
  </button>
</div>

<div class="layout">
  <!-- Users / conversations panel -->
  <div class="users-panel">
    {% if current_user.is_admin %}
    <div class="users-head">İstifadəçilər</div>
    <div class="users-list" id="usersList">
      {% for u in users %}
      <div class="user-item" id="ui-{{ u.id }}" onclick='openChat({{ u.id }}, {{ u.username | tojson }})'>
        <div class="user-avatar">
          {{ u.username[0].upper() }}
          <div class="online-dot" id="dot-{{ u.id }}"></div>
        </div>
        <div class="user-info">
          <div class="user-name">{{ u.username }}</div>
          <div class="user-status" id="status-{{ u.id }}">offline</div>
        </div>
        <div class="unread-badge" id="unread-{{ u.id }}"></div>
      </div>
      {% endfor %}
    </div>
    {% else %}
    <div class="users-head">Söhbətlər</div>
    <div class="find-user-bar">
      <div class="find-user-row">
        <input id="findInput" type="text" placeholder="İstifadəçi adı yazın…"
               autocomplete="off"
               onkeydown="if(event.key==='Enter') findAndOpenUser()" />
        <button class="find-user-btn" onclick="findAndOpenUser()">→</button>
      </div>
      <div class="find-user-err" id="findErr"></div>
    </div>
    <div class="users-list" id="usersList"></div>
    {% endif %}
  </div>

  <!-- Chat -->
  <div class="chat-area" id="chatArea">
    <div class="chat-empty" id="chatEmpty">
      <div class="chat-empty-icon">💬</div>
      <div>Söhbət başlatmaq üçün bir istifadəçi seçin</div>
    </div>
  </div>
</div>

<script>
const ME_ID   = {{ current_user.id }};
const ME_NAME = "{{ current_user.username }}";
const IS_ADMIN = {{ 'true' if current_user.is_admin else 'false' }};
let peerId = null, peerName = null;
let typingTimer = null;
let isTyping = false;

const socket = io();

socket.on("online_list", list => {
  document.querySelectorAll(".online-dot").forEach(d => {
    d.classList.remove("online");
    const uid = d.id.replace("dot-", "");
    document.getElementById(`status-${uid}`).textContent = "offline";
  });
  Object.keys(list).forEach(uid => {
    const dot = document.getElementById(`dot-${uid}`);
    const st  = document.getElementById(`status-${uid}`);
    if (dot) { dot.classList.add("online"); st.textContent = "online"; }
  });
});

socket.on("new_message", msg => {
  // For non-admins: ensure sender appears in conversation list
  if (!IS_ADMIN && msg.sender_id !== ME_ID) {
    ensureConversation(msg.sender_id, msg.sender);
  }
  if ((msg.sender_id === peerId && msg.sender_id !== ME_ID) ||
      (msg.sender_id === ME_ID && msg.sender_id !== peerId)) {
    appendMsg(msg);
  } else if (msg.sender_id !== ME_ID) {
    const badge = document.getElementById(`unread-${msg.sender_id}`);
    if (badge) {
      const cur = parseInt(badge.textContent) || 0;
      badge.textContent = cur + 1;
      badge.classList.add("visible");
    }
  }
});

socket.on("typing", d => {
  if (d.from === peerId) showTyping(true);
});
socket.on("stop_typing", d => {
  if (d.from === peerId) showTyping(false);
});

async function openChat(uid, uname) {
  peerId = uid; peerName = uname;

  document.querySelectorAll(".user-item").forEach(el => el.classList.remove("active"));
  document.getElementById(`ui-${uid}`).classList.add("active");
  const badge = document.getElementById(`unread-${uid}`);
  badge.textContent = ''; badge.classList.remove("visible");

  if (window.innerWidth <= 700) {
    document.querySelector('.layout').classList.add('chat-open');
  }

  const area = document.getElementById("chatArea");
  area.innerHTML = `
    <div class="chat-header">
      <button class="back-btn" onclick="closeChat()">
        <svg viewBox="0 0 24 24" style="width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
      </button>
      <div class="chat-peer-avatar">${escHtml(uname[0].toUpperCase())}</div>
      <div>
        <div class="chat-peer-name">${escHtml(uname)}</div>
        <div class="chat-peer-sub" id="peerSub"></div>
      </div>
      <button class="call-header-btn" onclick="startCall()" title="Zəng et">
        <svg viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.41 2 2 0 0 1 3.6 1.24h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L7.91 8.84a16 16 0 0 0 6.29 6.29l.86-.86a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
      </button>
    </div>
    <div class="messages" id="msgList"></div>
    <div class="typing-indicator" id="typingEl">
      <div class="typing-dots"><span></span><span></span><span></span></div>
      <span>${escHtml(uname)} yazır...</span>
    </div>
    <div class="input-bar" id="inputBar">
      <textarea class="msg-input" id="msgInput" rows="1"
        placeholder="${escHtml(uname)} ilə söhbət..."
        oninput="autoResize(this); handleTyping()"
        onkeydown="onKey(event)"></textarea>
      <button class="send-btn" onclick="sendMsg()">
        <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
  `;

  const history = await fetch(`/chat/history/${uid}`).then(r => r.json());
  const list = document.getElementById("msgList");
  let lastDate = null;
  history.forEach(m => {
    const d = new Date();
    if (d !== lastDate) { lastDate = d; }
    list.appendChild(buildMsg(m));
  });
  list.scrollTop = list.scrollHeight;
  document.getElementById("msgInput").focus();
}

function buildMsg(m) {
  const mine = m.sender_id === ME_ID;
  const row = document.createElement("div");
  row.className = `msg-row${mine ? " mine" : ""}`;
  row.innerHTML = `
    <div class="msg-bubble">${escHtml(m.content)}</div>
    <div class="msg-time">${m.time}</div>
  `;
  return row;
}

function appendMsg(m) {
  const list = document.getElementById("msgList");
  if (!list) return;
  list.appendChild(buildMsg(m));
  list.scrollTop = list.scrollHeight;
}

function sendMsg() {
  const inp = document.getElementById("msgInput");
  if (!inp || !peerId) return;
  const content = inp.value.trim();
  if (!content) return;
  socket.emit("private_message", { receiver_id: peerId, content });
  inp.value = "";
  autoResize(inp);
  stopTyping();
}

function onKey(e) {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMsg(); }
}

function handleTyping() {
  if (!isTyping) {
    isTyping = true;
    socket.emit("typing", { receiver_id: peerId });
  }
  clearTimeout(typingTimer);
  typingTimer = setTimeout(stopTyping, 1500);
}

function stopTyping() {
  if (isTyping) {
    isTyping = false;
    socket.emit("stop_typing", { receiver_id: peerId });
  }
}

function showTyping(show) {
  const el = document.getElementById("typingEl");
  if (el) el.classList.toggle("visible", show);
}

function autoResize(el) {
  el.style.height = "auto";
  el.style.height = Math.min(el.scrollHeight, 120) + "px";
}

function closeChat() {
  document.querySelector('.layout').classList.remove('chat-open');
  peerId = null; peerName = null;
  document.querySelectorAll('.user-item').forEach(el => el.classList.remove('active'));
}

function escHtml(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/\n/g,"<br>");
}

// ── Non-admin: find user + conversation helpers ───────────────
async function findAndOpenUser() {
  const input = document.getElementById('findInput');
  const errEl = document.getElementById('findErr');
  const username = (input.value || '').trim();
  if (!username) return;
  errEl.style.display = 'none';
  const res = await fetch('/chat/find-user', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ username })
  });
  const data = await res.json();
  if (!res.ok) {
    errEl.textContent = data.error;
    errEl.style.display = 'block';
    return;
  }
  input.value = '';
  ensureConversation(data.id, data.username);
  openChat(data.id, data.username);
}

function ensureConversation(uid, uname) {
  if (!document.getElementById(`ui-${uid}`)) addConversationItem(uid, uname);
}

function addConversationItem(uid, uname) {
  const list = document.getElementById('usersList');
  if (!list) return;
  const item = document.createElement('div');
  item.className = 'user-item';
  item.id = `ui-${uid}`;
  item.onclick = () => openChat(uid, uname);
  item.innerHTML = `
    <div class="user-avatar">${escHtml(uname[0].toUpperCase())}<div class="online-dot" id="dot-${uid}"></div></div>
    <div class="user-info">
      <div class="user-name">${escHtml(uname)}</div>
      <div class="user-status" id="status-${uid}">offline</div>
    </div>
    <div class="unread-badge" id="unread-${uid}"></div>
  `;
  list.appendChild(item);
}

// Load unread counts on start
fetch("/chat/unread").then(r => r.json()).then(data => {
  Object.entries(data).forEach(([uid, cnt]) => {
    const badge = document.getElementById(`unread-${uid}`);
    if (badge && cnt > 0) { badge.textContent = cnt; badge.classList.add("visible"); }
  });
});

// Non-admin: load existing conversations on page load
if (!IS_ADMIN) {
  fetch('/chat/conversations').then(r => r.json()).then(list => {
    list.forEach(u => ensureConversation(u.id, u.username));
    // then apply unread counts
    fetch("/chat/unread").then(r => r.json()).then(data => {
      Object.entries(data).forEach(([uid, cnt]) => {
        const badge = document.getElementById(`unread-${uid}`);
        if (badge && cnt > 0) { badge.textContent = cnt; badge.classList.add("visible"); }
      });
    });
  });
}

// ── WebRTC Call System ────────────────────────────────────────
const ICE_SERVERS = {
  iceServers: [
    { urls: "stun:stun.l.google.com:19302" },
    { urls: "stun:stun1.l.google.com:19302" }
  ]
};

// ── Audio unlock + ring ───────────────────────────────────────
let _ac = null;          // shared AudioContext
let _ringId = null;      // setInterval handle

function _acGet() {
  if (_ac && _ac.state !== 'closed') return _ac;
  try { _ac = new (window.AudioContext || window.webkitAudioContext)(); } catch { _ac = null; }
  return _ac;
}

// Call from any user gesture so the context is pre-running on mobile
function _acUnlock() {
  const ctx = _acGet();
  if (!ctx) return;
  if (ctx.state === 'suspended') ctx.resume().catch(() => {});
  try {
    const b = ctx.createBuffer(1, 1, 22050);
    const s = ctx.createBufferSource();
    s.buffer = b; s.connect(ctx.destination); s.start(0);
  } catch {}
}
['touchstart', 'touchend', 'click', 'keydown'].forEach(e =>
  document.addEventListener(e, _acUnlock, { passive: true })
);

function _beep() {
  const ctx = _ac;
  if (!ctx || ctx.state !== 'running') return;
  try {
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.frequency.value = 880; g.gain.value = 0.28;
    o.start(); o.stop(ctx.currentTime + 0.32);
  } catch {}
}

function startRing() {
  if (_ringId) return;
  const ctx = _acGet();
  if (!ctx) return;
  const go = () => {
    if (!_ac || _ac.state === 'closed') return;
    if (_ac.state === 'suspended') { _ac.resume().then(_beep).catch(() => {}); }
    else { _beep(); }
  };
  go();
  _ringId = setInterval(go, 1200);
}

function stopRing() {
  if (_ringId) { clearInterval(_ringId); _ringId = null; }
}
function showNotification(name) {
  if (!("Notification" in window)) return;
  const show = () => { try { new Notification("📞 Gələn zəng", { body: name + " zəng edir...", icon: "/static/icon.png" }); } catch {} };
  if (Notification.permission === "granted") show();
  else if (Notification.permission !== "denied") Notification.requestPermission().then(p => { if (p === "granted") show(); });
}

let pc           = null;
let localStream  = null;
let callState    = null;   // null | 'calling' | 'incoming' | 'active'
let callPeerId   = null;
let callPeerName = null;
let isMuted      = false;
let callTimer    = null;
let callSeconds  = 0;

function createPC(pid) {
  const conn = new RTCPeerConnection(ICE_SERVERS);
  conn.onicecandidate = e => {
    if (e.candidate)
      socket.emit("ice_candidate", { peer_id: pid, candidate: e.candidate });
  };
  conn.ontrack = e => {
    const audio = document.getElementById("remoteAudio");
    if (audio) { audio.srcObject = e.streams[0]; audio.play().catch(() => {}); }
  };
  conn.onconnectionstatechange = () => {
    if (conn.connectionState === "disconnected" || conn.connectionState === "failed")
      resetCall();
  };
  return conn;
}

function startTimer() {
  callSeconds = 0;
  callTimer = setInterval(() => {
    callSeconds++;
    const m = String(Math.floor(callSeconds / 60)).padStart(2, "0");
    const s = String(callSeconds % 60).padStart(2, "0");
    const el = document.getElementById("callDuration");
    if (el) el.textContent = `${m}:${s}`;
  }, 1000);
}

function showActiveBar(name) {
  document.getElementById("activeCallName").textContent  = name;
  document.getElementById("callDuration").textContent    = "00:00";
  document.getElementById("activeCallBar").style.display = "flex";
  startTimer();
}

function resetCall() {
  clearInterval(callTimer); callTimer = null; callSeconds = 0;
  if (localStream) { localStream.getTracks().forEach(t => t.stop()); localStream = null; }
  if (pc) { pc.close(); pc = null; }
  isMuted = false;
  callState = callPeerId = callPeerName = null;
  document.getElementById("incomingCallOverlay").style.display = "none";
  document.getElementById("callingOverlay").style.display      = "none";
  document.getElementById("activeCallBar").style.display       = "none";
  const mb = document.getElementById("muteBtn");
  if (mb) mb.classList.remove("muted-bar");
}

// ── Initiate ──────────────────────────────────────────────────
async function startCall() {
  if (callState || !peerId) return;
  callPeerId = peerId; callPeerName = peerName;
  callState = "calling";
  try {
    localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
  } catch {
    alert("Mikrofona icazə verilmədi. Brauzer parametrlərini yoxlayın.");
    callState = null; return;
  }
  pc = createPC(callPeerId);
  localStream.getTracks().forEach(t => pc.addTrack(t, localStream));
  socket.emit("call_invite", { receiver_id: callPeerId });
  document.getElementById("callingAvatar").textContent       = callPeerName[0].toUpperCase();
  document.getElementById("callingName").textContent         = callPeerName;
  document.getElementById("callingOverlay").style.display    = "flex";
}

function cancelCall() {
  socket.emit("call_end", { peer_id: callPeerId });
  resetCall();
}

// ── Receive ───────────────────────────────────────────────────
socket.on("call_invite", data => {
  if (callState) { socket.emit("call_reject", { caller_id: data.from_id }); return; }
  callPeerId = data.from_id; callPeerName = data.from_name;
  callState = "incoming";
  document.getElementById("incomingAvatar").textContent          = callPeerName[0].toUpperCase();
  document.getElementById("incomingName").textContent            = callPeerName;
  document.getElementById("incomingCallOverlay").style.display   = "flex";
  startRing();
  showNotification(callPeerName);
});

async function acceptCall() {
  stopRing();
  document.getElementById("incomingCallOverlay").style.display = "none";
  try {
    localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
  } catch {
    alert("Mikrofona icazə verilmədi.");
    socket.emit("call_reject", { caller_id: callPeerId });
    resetCall(); return;
  }
  pc = createPC(callPeerId);
  localStream.getTracks().forEach(t => pc.addTrack(t, localStream));
  socket.emit("call_accept", { caller_id: callPeerId });
  callState = "active";
  showActiveBar(callPeerName);
}

function rejectCall() {
  stopRing();
  socket.emit("call_reject", { caller_id: callPeerId });
  resetCall();
}

function endCall() {
  socket.emit("call_end", { peer_id: callPeerId });
  resetCall();
}

// ── Signaling ─────────────────────────────────────────────────
socket.on("call_accept", async () => {
  document.getElementById("callingOverlay").style.display = "none";
  callState = "active";
  showActiveBar(callPeerName);
  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);
  socket.emit("webrtc_offer", { receiver_id: callPeerId, sdp: pc.localDescription });
});

socket.on("call_reject", () => resetCall());
socket.on("call_end",    () => resetCall());

socket.on("webrtc_offer", async data => {
  if (!pc) return;
  await pc.setRemoteDescription(new RTCSessionDescription(data.sdp));
  const answer = await pc.createAnswer();
  await pc.setLocalDescription(answer);
  socket.emit("webrtc_answer", { caller_id: callPeerId, sdp: pc.localDescription });
});

socket.on("webrtc_answer", async data => {
  if (!pc) return;
  await pc.setRemoteDescription(new RTCSessionDescription(data.sdp));
});

socket.on("ice_candidate", async data => {
  if (!pc || !data.candidate) return;
  try { await pc.addIceCandidate(new RTCIceCandidate(data.candidate)); } catch {}
});

// ── Mute ─────────────────────────────────────────────────────
function toggleMute() {
  if (!localStream) return;
  isMuted = !isMuted;
  localStream.getAudioTracks().forEach(t => { t.enabled = !isMuted; });
  const btn = document.getElementById("muteBtn");
  if (btn) { btn.classList.toggle("muted-bar", isMuted); btn.title = isMuted ? "Səsi aç" : "Səsi kəs"; }
}
</script>

      <svg viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.41 2 2 0 0 1 3.6 1.24h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L7.91 8.84a16 16 0 0 0 6.29 6.29l.86-.86a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
